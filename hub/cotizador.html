<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0F2847" />
<title>ZenderHub — Cotizador Comercial v2</title>
<style>
  /* ═══════════════════════════════════════════════════════════════
     ZenderHub Design System — tokens oficiales
     Aplicados del design system publicado en Claude Design.
     Paleta: Magenta #A3086A · Cyan #009CC9 · Navy #081F3A · Charcoal #2D2D2D
     Tipografía: Exo (con fallback a Inter)
     Spacing: 8px grid · Radii: 0/4/8/16 · Sombras: 2-tier
     Gradient signature (Magenta→Cyan 90°): reservado para hero CTA.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Primarios */
    --magenta:     #A3086A;
    --magenta-2:   #820551;
    --magenta-bg:  #FBE9F3;
    --cyan:        #009CC9;
    --cyan-2:      #007BA0;
    --cyan-bg:     #E0F4FA;
    --navy:        #081F3A;
    --navy-2:      #12345A;
    --charcoal:    #2D2D2D;

    /* Escala de grises operativa */
    --grey-100:    #F5F6F8;
    --grey-300:    #D4D7DE;
    --grey-500:    #8B919B;
    --grey-700:    #4B515C;

    /* Semánticos (Good / Seconds / Damage) */
    --success:     #0A8F5B;
    --success-bg:  #E5F5EE;
    --warning:     #D98F00;
    --warning-bg:  #FDF3DC;
    --danger:      #C22626;
    --danger-bg:   #FBE5E5;

    /* Aliases retro-compatibles con el HTML/JS existente */
    --bg:          #F5F6F8;
    --card:        #FFFFFF;
    --text:        #2D2D2D;
    --muted:       #8B919B;
    --border:      #D4D7DE;
    --border-2:    #4B515C;
    --green:       #0A8F5B;
    --green-bg:    #E5F5EE;
    --amber:       #D98F00;
    --amber-bg:    #FDF3DC;
    --red:         #C22626;
    --red-bg:      #FBE5E5;

    /* Gradient signature — hero only, uno por pieza */
    --gradient-signature: linear-gradient(90deg, #A3086A 0%, #009CC9 100%);

    /* Sombras 2-tier */
    --shadow-sm:   0 1px 2px rgba(8, 31, 58, 0.06);
    --shadow-md:   0 4px 12px rgba(8, 31, 58, 0.08);
    --shadow-lg:   0 8px 24px rgba(8, 31, 58, 0.12);

    /* Radii — escala 0/4/8/16 */
    --radius-sm:   4px;
    --radius:      8px;
    --radius-md:   12px;
    --radius-lg:   16px;

    /* Motion */
    --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
    --t-fast:      120ms;
    --t-base:      160ms;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Exo", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 92px; /* espacio para tab bar */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--magenta); color: #fff; }
  h1, h2, h3, h4 { margin: 0 0 8px 0; font-weight: 700; color: var(--navy); }
  h1 { font-size: 22px; letter-spacing: -0.02em; line-height: 1.2; }
  h2 { font-size: 19px; letter-spacing: -0.015em; line-height: 1.25; }
  h3 { font-size: 16px; letter-spacing: -0.01em; line-height: 1.3; font-weight: 500; }
  p  { margin: 0 0 8px 0; }
  strong, b { font-weight: 700; color: var(--navy); }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
  /* Tabular figures por default en toda UI numérica */
  .num-input, .val, .num, .pct, .kv-row .v, .cap-head, td.right { font-variant-numeric: tabular-nums; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--navy);
    color: #fff;
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-md);
  }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand img { max-height: 28px; width: auto; display: block; }
  header .brand .fallback {
    font-weight: 700; font-size: 18px; letter-spacing: -0.02em; color: #fff;
  }
  header .brand .fallback span { color: var(--cyan); }
  #admin-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    min-height: 36px;
    transition: background var(--t-fast) var(--ease-out), transform var(--t-fast) var(--ease-out);
  }
  #admin-btn:hover { background: rgba(255,255,255,0.14); }
  #admin-btn.authed {
    background: var(--magenta); color: #fff; font-weight: 700;
  }
  #admin-btn.authed:hover { background: var(--magenta-2); }

  /* Main */
  main { padding: 16px; max-width: 560px; margin: 0 auto; }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
    border: 1px solid var(--grey-300);
    transition: box-shadow var(--t-base) var(--ease-out);
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card h2 { color: var(--navy); }
  .card .card-sub { color: var(--grey-500); font-size: 13px; margin-bottom: 16px; }
  .card.dark {
    background: var(--navy);
    color: #fff;
    border-color: transparent;
    box-shadow: var(--shadow-md);
  }
  .card.dark h2, .card.dark h3 { color: #fff; }
  .card.dark .card-sub { color: rgba(255,255,255,0.7); }

  /* Form controls */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--grey-700); margin-bottom: 6px; letter-spacing: 0.01em; }
  .field label .hint { font-weight: 400; color: var(--grey-500); font-size: 12px; margin-left: 6px; }

  /* Segmented control */
  .segmented {
    display: flex; gap: 4px;
    background: var(--grey-100);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--grey-300);
  }
  .segmented button {
    flex: 1; min-height: 44px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    color: var(--grey-500);
    transition: background var(--t-fast) var(--ease-out), color var(--t-fast) var(--ease-out);
  }
  .segmented button:hover { color: var(--navy); }
  .segmented button.active {
    background: var(--navy); color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .segmented.accent button.active { background: var(--magenta); color: #fff; }
  .warn-inline { color: var(--warning); font-size: 12px; margin-top: 6px; font-weight: 600; }

  /* Slider + numeric bidir sync */
  .slider-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 12px;
    align-items: center;
  }
  .slider-row input[type="range"] {
    width: 100%;
    height: 44px;
    -webkit-appearance: none; appearance: none;
    background: transparent;
  }
  .slider-row input[type="range"]::-webkit-slider-runnable-track {
    height: 6px; background: var(--grey-300); border-radius: 999px;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--magenta);
    margin-top: -8px; cursor: pointer;
    border: 3px solid #fff;
    box-shadow: 0 1px 3px rgba(163, 8, 106, 0.35);
    transition: transform var(--t-fast) var(--ease-out);
  }
  .slider-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.08); }
  .slider-row input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--magenta); border: 3px solid #fff; cursor: pointer;
    box-shadow: 0 1px 3px rgba(163, 8, 106, 0.35);
  }
  .slider-row input[type="range"]::-moz-range-track {
    height: 6px; background: var(--grey-300); border-radius: 999px;
  }
  .num-input {
    min-height: 44px; padding: 8px 10px;
    border: 1px solid var(--grey-300); border-radius: var(--radius);
    background: #fff; text-align: right;
    font: 600 15px/1 inherit; color: var(--navy);
    width: 100%;
    transition: border-color var(--t-fast) var(--ease-out), box-shadow var(--t-fast) var(--ease-out);
  }
  .num-input:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-bg);
  }
  .num-prefix { position: relative; }
  .num-prefix::before {
    content: attr(data-prefix);
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--grey-500); font-weight: 500;
    pointer-events: none;
  }
  .num-prefix .num-input { padding-left: 22px; text-align: left; }

  /* Radio-row */
  .radio-row { display: flex; gap: 8px; margin: 6px 0; }
  .radio-row label {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: #fff; border: 1px solid var(--grey-300);
    border-radius: var(--radius); cursor: pointer;
    font-size: 14px; font-weight: 500;
    min-height: 44px;
    transition: all var(--t-fast) var(--ease-out);
  }
  .radio-row label:hover { border-color: var(--grey-500); }
  .radio-row label.active {
    background: var(--magenta-bg);
    border-color: var(--magenta);
    color: var(--magenta-2);
    font-weight: 600;
  }
  .radio-row input { accent-color: var(--magenta); }

  /* Semaforo — status hero, semánticos sólidos (sin gradients doblados) */
  .semaforo {
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    text-align: center;
    color: #fff;
    margin-bottom: 14px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .semaforo.verde    { background: var(--success); }
  .semaforo.amarillo { background: var(--warning); }
  .semaforo.rojo     { background: var(--danger); }
  .semaforo .status {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
    opacity: 0.92; font-weight: 700;
  }
  .semaforo .title {
    font-size: 36px; font-weight: 900; letter-spacing: -0.03em;
    margin: 6px 0 10px 0; line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .semaforo .frase { font-size: 15px; line-height: 1.5; opacity: 0.98; font-weight: 500; }

  /* Prices grid */
  .prices {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .price-box {
    background: #fff;
    border: 1px solid var(--grey-300);
    border-radius: var(--radius-md);
    padding: 14px 8px;
    text-align: center;
    transition: transform var(--t-fast) var(--ease-out), box-shadow var(--t-fast) var(--ease-out);
  }
  .price-box:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .price-box .lbl {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--grey-500); font-weight: 700;
  }
  .price-box .val {
    font-size: 20px; font-weight: 900; color: var(--navy);
    margin-top: 6px; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .price-box.primary {
    border-color: var(--navy);
    background: var(--navy);
    color: #fff;
  }
  .price-box.primary .lbl { color: rgba(255,255,255,0.78); }
  .price-box.primary .val { color: #fff; }
  .price-box .star { font-size: 10px; color: var(--magenta); font-weight: 800; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Capacity bar */
  .capbar {
    background: var(--grey-100); border-radius: var(--radius-md); padding: 14px;
    border: 1px solid var(--grey-300); margin-bottom: 14px;
  }
  .capbar .cap-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .capbar .cap-head .name { font-weight: 600; color: var(--navy); font-size: 14px; }
  .capbar .cap-head .pct { font-weight: 900; font-size: 18px; color: var(--navy); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .capbar .cap-track {
    height: 12px; background: var(--grey-300); border-radius: 999px; overflow: hidden;
    position: relative;
  }
  .capbar .cap-fill {
    height: 100%; border-radius: 999px;
    transition: width 0.4s var(--ease-out), background 0.3s var(--ease-out);
  }
  .capbar .cap-fill.ok    { background: var(--success); }
  .capbar .cap-fill.warn  { background: var(--warning); }
  .capbar .cap-fill.bad   { background: var(--danger); }
  .capbar .cap-sub { font-size: 12px; color: var(--grey-500); margin-top: 8px; }

  /* Details / collapse */
  details { border: 1px solid var(--grey-300); border-radius: var(--radius-md); background: var(--grey-100); padding: 0; }
  details summary {
    padding: 14px 16px; cursor: pointer; font-weight: 600; color: var(--navy);
    list-style: none; min-height: 44px; display: flex; align-items: center; justify-content: space-between;
    font-size: 14px;
  }
  details summary::after { content: "▸"; transition: transform 0.2s var(--ease-out); color: var(--grey-500); }
  details[open] summary::after { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }
  details .details-body {
    padding: 0 16px 16px 16px; font-size: 13px; color: var(--text);
  }

  .kv-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--grey-300); }
  .kv-row:last-child { border-bottom: none; }
  .kv-row .k { color: var(--grey-500); }
  .kv-row .v { font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }

  /* Portfolio table */
  .pf-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 14px; }
  .pf-table th {
    text-align: left; padding: 10px 8px;
    color: var(--grey-500); font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 2px solid var(--grey-300);
  }
  .pf-table td { padding: 12px 8px; border-bottom: 1px solid var(--grey-300); }
  .pf-table td.right { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--navy); }
  .pf-table td.label { color: var(--text); font-weight: 500; }
  .pf-table .delta-positive { color: var(--success); font-weight: 700; }
  .pf-table .delta-negative { color: var(--danger); font-weight: 700; }

  /* Bar chart — Navy / Magenta brand palette */
  .chart-bar { margin-bottom: 12px; }
  .chart-bar .lbl { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .chart-bar .lbl .k { color: var(--navy); font-weight: 600; }
  .chart-bar .lbl .v { color: var(--grey-500); font-variant-numeric: tabular-nums; }
  .chart-bar .track { height: 16px; background: var(--grey-300); border-radius: 999px; overflow: hidden; display: flex; }
  .chart-bar .seg-beckett { background: var(--navy); height: 100%; transition: width 0.4s var(--ease-out); }
  .chart-bar .seg-c2      { background: var(--magenta); height: 100%; transition: width 0.4s var(--ease-out); }

  /* Simulator */
  .sim-row { margin-bottom: 14px; }
  .sim-row .sim-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .sim-row .sim-head .k { font-weight: 600; color: var(--navy); font-size: 14px; }
  .sim-row .sim-head .k .flag { color: var(--success); font-weight: 700; margin-left: 6px; font-size: 12px; }
  .sim-tooltip {
    background: var(--success-bg); color: #064F32;
    padding: 10px 12px; border-radius: var(--radius);
    font-size: 12px; margin-top: 8px;
    border-left: 3px solid var(--success);
    line-height: 1.5;
  }
  .preset-list button {
    display: flex; width: 100%; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--grey-300);
    padding: 14px 16px; border-radius: var(--radius-md);
    margin-bottom: 8px; text-align: left;
    font-weight: 600; color: var(--navy);
    font-size: 14px;
    min-height: 52px;
    transition: all var(--t-fast) var(--ease-out);
  }
  .preset-list button:hover {
    border-color: var(--magenta);
    background: var(--magenta-bg);
    transform: translateX(2px);
  }
  .preset-list button.recommended {
    background: var(--success-bg);
    border-color: var(--success);
    color: #064F32;
  }
  .preset-list .badge-reco {
    background: var(--success); color: #fff;
    font-size: 10px; font-weight: 800;
    padding: 4px 8px; border-radius: 999px;
    letter-spacing: 0.08em; margin-left: auto;
    text-transform: uppercase;
  }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric-box {
    background: var(--grey-100); padding: 14px;
    border-radius: var(--radius-md); border: 1px solid var(--grey-300);
  }
  .metric-box .lbl {
    font-size: 11px; text-transform: uppercase;
    color: var(--grey-500); font-weight: 700; letter-spacing: 0.08em;
  }
  .metric-box .val {
    font-size: 24px; font-weight: 900; color: var(--navy);
    margin-top: 6px; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .metric-box .val.pos { color: var(--success); }
  .metric-box .val.neg { color: var(--danger); }
  .metric-box .sub { font-size: 12px; color: var(--grey-500); margin-top: 4px; }

  /* Reaccion banner */
  .reaccion {
    padding: 14px 16px; border-radius: var(--radius-md); margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
    font-weight: 600;
    line-height: 1.4;
  }
  .reaccion.verde    { background: var(--success-bg); color: #064F32; border-left: 4px solid var(--success); }
  .reaccion.amarillo { background: var(--warning-bg); color: #7A4F00; border-left: 4px solid var(--warning); }
  .reaccion.rojo     { background: var(--danger-bg);  color: #7A1515; border-left: 4px solid var(--danger); }
  .reaccion .ico { font-size: 22px; flex-shrink: 0; }

  /* PIN pad */
  .pin-wrap { max-width: 280px; margin: 40px auto; text-align: center; }
  .pin-wrap h2 { font-size: 20px; margin-bottom: 4px; }
  .pin-dots {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 32px;
  }
  .pin-dot {
    width: 46px; height: 56px;
    border: 2px solid var(--grey-300); border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900; color: var(--navy);
    background: #fff;
    transition: all var(--t-fast) var(--ease-out);
    font-variant-numeric: tabular-nums;
  }
  .pin-dot.filled { border-color: var(--magenta); background: var(--magenta-bg); color: var(--magenta-2); }
  .pin-dot.error { border-color: var(--danger); background: var(--danger-bg); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .pin-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .pin-grid button {
    min-height: 64px; font-size: 22px; font-weight: 700;
    background: #fff; border: 1px solid var(--grey-300);
    border-radius: var(--radius-lg); color: var(--navy);
    box-shadow: var(--shadow-sm);
    transition: all var(--t-fast) var(--ease-out);
    font-variant-numeric: tabular-nums;
  }
  .pin-grid button:hover { border-color: var(--magenta); color: var(--magenta); }
  .pin-grid button:active { background: var(--grey-100); transform: scale(0.96); }
  .pin-grid button.action { background: var(--grey-100); font-size: 13px; font-weight: 600; color: var(--grey-700); }
  .pin-grid button.action:hover { color: var(--navy); border-color: var(--grey-500); }

  /* Admin cards — oportunidades */
  .opp {
    display: flex; gap: 14px;
    padding: 16px; border-radius: var(--radius-md);
    background: var(--card); border: 1px solid var(--grey-300);
    margin-bottom: 10px;
    transition: box-shadow var(--t-base) var(--ease-out);
  }
  .opp:hover { box-shadow: var(--shadow-sm); }
  .opp .ico { font-size: 26px; flex-shrink: 0; line-height: 1; }
  .opp .body .title { font-weight: 700; color: var(--navy); margin-bottom: 4px; font-size: 15px; }
  .opp .body .desc { font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
  .opp .body .num { font-size: 20px; font-weight: 900; margin-bottom: 4px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .opp.high   { border-left: 4px solid var(--warning); }
  .opp.high .num   { color: var(--warning); }
  .opp.crit   { border-left: 4px solid var(--danger); }
  .opp.crit .num   { color: var(--danger); }
  .opp.med    { border-left: 4px solid var(--cyan); }
  .opp.med .num    { color: var(--cyan-2); }

  .alert {
    background: var(--danger-bg); color: #7A1515;
    padding: 12px 14px; border-radius: var(--radius-md);

</style>

<nav class="tabbar" role="tablist">

  <button data-module="B" role="tab"><span class="ico">📊</span>Portfolio</button>
  <button data-module="C" role="tab"><span class="ico">⚖️</span>Tarifas</button>

<script>
/* ════════════════════════════════════════════════════════════════════════
   ZenderHub Cotizador v2 — fórmulas y constantes calibradas con data real.
   Fuentes: costos-reales.md · tarifas-actuales.json · beckett-benchmark.json
   ════════════════════════════════════════════════════════════════════════ */

// PIN de acceso al módulo admin. Cambiá acá si querés otro PIN.
const ADMIN_PIN = "0707";

// ──────────────── CONSTANTES DEL MODELO ────────────────
const MODEL = {
  // Costos fijos (costos-reales.md §2.3)
  fijos_miami:      34438,
  fijos_bogota:     6854,
  fijos_total:      41292,
  gap_breakeven:    1886,                 // $41,292 - $39,406 Beckett

  // Costos variables por orden — corrección founder aplicada.
  // MO Miami NO entra (ya está en Professional Services 1099 del founder).
  costo_var_miami_rfid_on:  0.45,         // packing 0.33 + RFID 0.095 + ship 0.02
  costo_var_miami_rfid_off: 0.35,         // packing 0.33 + ship 0.02
  costo_var_bogota_rfid_on: 0.76,         // packing 0.33 + MO Bogotá 0.31 + RFID 0.095 + ship 0.02
  costo_var_bogota_rfid_off:0.66,         // packing 0.33 + MO Bogotá 0.31 + ship 0.02
  costo_var_returns_miami:  0.65,         // midpoint rango $0.50-$0.80 §4

  // Tarifas actuales (tarifas-actuales.json)
  tarifa_receiving: 0.60,
  tarifa_picking:   0.94,
  tarifa_packing:   1.92,
  tarifa_returns:   3.00,
  rfid_tarifa_cobrada: 0.20,
  rfid_costo_promedio: 0.295,
  rfid_perdida_por_tag: 0.095,

  // Beckett benchmark (beckett-benchmark.json)
  beckett_ordenes_mes:        9106,
  beckett_productos_por_orden: 1.49,
  beckett_skus_recibidos_mes: 12000,
  beckett_devoluciones_mes:   1277,
  beckett_tasa_devolucion:    0.12,
  beckett_revenue_real:       39406,
  beckett_miami_share:        0.5165,
  beckett_bogota_share:       0.4835,
  beckett_ratio_receiving:    0.72,
  beckett_valor_retail:       5385345,
  beckett_roi_retail:         87,

  // Capacidad Miami (benchmark + utilización 0.65)
  beckett_miami_ordenes:      4705,       // 9,106 × 0.5165
  miami_ordenes_capacidad_max: 7238,      // 4,705 / 0.65
};

// Tarifas piso y techo para sliders Módulo A (service mode)
const TARIFF_RANGES = {
  r:  { min: 0.30, max: 1.50, step: 0.05, def: 0.60, unit: "/SKU recibido" },
  pi: { min: 0.50, max: 2.00, step: 0.05, def: 0.94, unit: "/producto pickeado" },
  pa: { min: 1.00, max: 3.50, step: 0.05, def: 1.92, unit: "/orden" },
  re: { min: 1.50, max: 6.00, step: 0.10, def: 3.00, unit: "/devolución" },
};

// ──────────────── ESTADO GLOBAL (en memoria, se comparte entre tabs) ────────────────
const state = {
  module: 'A',
  adminAuthed: false,

  // Módulo A — Cotizador
  quoter: {
    site:       'miami',
    rfid:       true,
    orders:     3500,
    ppo:        1.49,
    srcvOverride: null,         // si null, se auto-calcula como orders × 0.72
    rrPct:      0.12,
    priceMode:  'service',      // 'total' o 'service'
    totalPrice: 13000,
    tariffs:    { r: 0.55, pi: 0.85, pa: 1.80, re: 3.00 },
    negSlider:  null,           // si !=null, override del precio_prospecto calculado
    mixtoShareMiami: 0.52,
  },

  // Módulo C — Simulador de tarifas Beckett
  simulator: {
    r: 0.60, pi: 0.94, pa: 1.92, re: 3.00,
  },

  // Política de márgenes (exponible en Módulo D)
  policy: {
    margen_propuesto: 0.20,     // 20% sobre costo total = Precio Propuesto
    margen_ideal:     0.40,     // 40% sobre costo total = Precio Ideal
    participacion_gap: 1.0,     // cliente 2 absorbe 100% del gap por default
  },

  // PIN entry
  pinEntry: '',
  pinError: false,
};

// ──────────────── FORMATEO ────────────────
const fmt = {
  usd: (n) => "$" + Math.round(n).toLocaleString('en-US'),
  usd2: (n) => "$" + (Math.round(n*100)/100).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}),
  num: (n) => Math.round(n).toLocaleString('en-US'),
  pct: (n) => (n*100).toFixed(1) + "%",
  pctInt: (n) => Math.round(n*100) + "%",
  pctSigned: (n) => (n >= 0 ? "+" : "") + (n*100).toFixed(1) + "%",
  usdSigned: (n) => (n >= 0 ? "+" : "-") + "$" + Math.abs(Math.round(n)).toLocaleString('en-US'),
};

// ──────────────── CÁLCULOS — funciones puras ────────────────
function calcQuoter() {
  const q = state.quoter;
  const p = state.policy;

  const orders = Math.max(0, q.orders);
  const prods  = orders * q.ppo;
  const srcv   = q.srcvOverride != null ? q.srcvOverride : orders * 0.72;
  const devs   = orders * q.rrPct;
  const picks  = prods;

  const shareMiami = q.site === 'miami' ? 1.0
                   : q.site === 'bogota' ? 0.0
                   : q.mixtoShareMiami;

  const miamiCost  = q.rfid ? MODEL.costo_var_miami_rfid_on  : MODEL.costo_var_miami_rfid_off;
  const bogotaCost = q.rfid ? MODEL.costo_var_bogota_rfid_on : MODEL.costo_var_bogota_rfid_off;
  const costPerOrder = shareMiami * miamiCost + (1 - shareMiami) * bogotaCost;

  const costoVarProc    = orders * costPerOrder;
  const costoVarReturns = devs * MODEL.costo_var_returns_miami * shareMiami;
  const costoVarTotal   = costoVarProc + costoVarReturns;

  const asignacionGap = MODEL.gap_breakeven * p.participacion_gap;
  const costoTotal    = costoVarTotal + asignacionGap;

  const precioMinimo    = costoTotal;
  const precioPropuesto = costoTotal * (1 + p.margen_propuesto);
  const precioIdeal     = costoTotal * (1 + p.margen_ideal);

  // Revenue a tarifa lista (para comparar oferta prospecto vs lista)
  const revLista = srcv  * MODEL.tarifa_receiving
                 + picks * MODEL.tarifa_picking
                 + orders * MODEL.tarifa_packing
                 + devs  * MODEL.tarifa_returns * shareMiami;

  // Revenue a tarifas del prospecto (si modo por servicio)
  const revProspectoServicios = srcv * q.tariffs.r
                              + picks * q.tariffs.pi
                              + orders * q.tariffs.pa
                              + devs * q.tariffs.re * shareMiami;

  // Precio del prospecto final (prioridades: slider neg > input mode)
  let precioProspecto;
  if (q.negSlider != null) {
    precioProspecto = q.negSlider;
  } else if (q.priceMode === 'total') {
    precioProspecto = q.totalPrice;
  } else {
    precioProspecto = revProspectoServicios;
  }
  precioProspecto = Math.max(0, precioProspecto);

  const margen       = precioProspecto - costoTotal;
  const margenPct    = costoTotal > 0 ? margen / costoTotal : 0;
  const vsLista      = revLista > 0 ? (precioProspecto / revLista) - 1 : 0;

  let semaforo;
  if (precioProspecto >= precioIdeal)       semaforo = 'verde';
  else if (precioProspecto >= precioMinimo) semaforo = 'amarillo';
  else                                       semaforo = 'rojo';

  // Capacidad Miami
  const nuevosMiami = orders * shareMiami;
  const totalMiami  = MODEL.beckett_miami_ordenes + nuevosMiami;
  const utilMiami   = totalMiami / MODEL.miami_ordenes_capacidad_max;
  const capState    = utilMiami > 0.95 ? 'bad' : utilMiami > 0.85 ? 'warn' : 'ok';

  return {
    orders, prods, srcv, devs, picks, shareMiami,
    costPerOrder, costoVarProc, costoVarReturns, costoVarTotal, asignacionGap, costoTotal,
    precioMinimo, precioPropuesto, precioIdeal, precioProspecto,
    revLista, vsLista, margen, margenPct, semaforo,
    nuevosMiami, totalMiami, utilMiami, capState,
  };
}

function calcPortfolio() {
  const q = calcQuoter();

  // Beckett actual
  const beckettRev = MODEL.beckett_revenue_real;
  // Costo variable Beckett (prorrateado por split Miami/Bogotá)
  const beckettCostVarProc =
    MODEL.beckett_ordenes_mes * MODEL.beckett_miami_share * MODEL.costo_var_miami_rfid_on +
    MODEL.beckett_ordenes_mes * MODEL.beckett_bogota_share * MODEL.costo_var_bogota_rfid_on;
  const beckettCostVarReturns = MODEL.beckett_devoluciones_mes * MODEL.costo_var_returns_miami;
  const beckettCostVar = beckettCostVarProc + beckettCostVarReturns;
  const beckettMargen = beckettRev - beckettCostVar - MODEL.fijos_total;

  // Combinado con Cliente 2
  const c2Rev = q.precioProspecto;
  const c2CostVar = q.costoVarTotal;

  const totalRev    = beckettRev + c2Rev;
  const totalCostVar= beckettCostVar + c2CostVar;
  const totalMargen = totalRev - totalCostVar - MODEL.fijos_total;
  const fijosCubSolo = beckettRev / MODEL.fijos_total;
  const fijosCubComb = totalRev   / MODEL.fijos_total;

  // Miami util
  const miamiAct     = MODEL.beckett_miami_ordenes;
  const miamiTotal   = miamiAct + q.orders * q.shareMiami;
  const utilActual   = miamiAct   / MODEL.miami_ordenes_capacidad_max;
  const utilTotal    = miamiTotal / MODEL.miami_ordenes_capacidad_max;

  // Revenue por servicio (Beckett × lista + cliente2 a sus tarifas)
  const beckettRevPorSrv = {
    receiving: MODEL.beckett_skus_recibidos_mes * MODEL.tarifa_receiving,
    picking:   MODEL.beckett_ordenes_mes * MODEL.beckett_productos_por_orden * MODEL.tarifa_picking,
    packing:   MODEL.beckett_ordenes_mes * MODEL.tarifa_packing,
    returns:   MODEL.beckett_devoluciones_mes * MODEL.tarifa_returns,
  };
  // Cliente 2 revenue por servicio (solo si mode service). Si mode total, prorratear por shares típicos.
  const qr = state.quoter;
  let c2RevPorSrv;
  if (qr.priceMode === 'service' && qr.negSlider == null) {
    c2RevPorSrv = {
      receiving: q.srcv   * qr.tariffs.r,
      picking:   q.picks  * qr.tariffs.pi,
      packing:   q.orders * qr.tariffs.pa,
      returns:   q.devs   * qr.tariffs.re * q.shareMiami,
    };
  } else {
    // Prorratear por mix típico ecommerce del benchmark
    c2RevPorSrv = {
      receiving: c2Rev * 0.18,
      picking:   c2Rev * 0.29,
      packing:   c2Rev * 0.44,
      returns:   c2Rev * 0.09,
    };
  }

  return {
    beckettRev, beckettCostVar, beckettMargen,
    c2Rev, c2CostVar,
    totalRev, totalCostVar, totalMargen,
    fijosCubSolo, fijosCubComb,
    utilActual, utilTotal, miamiTotal,
    beckettRevPorSrv, c2RevPorSrv,
    quoterShareMiami: q.shareMiami,
  };
}

function calcSimulator() {
  const s = state.simulator;

  const revActualLista =
      MODEL.beckett_skus_recibidos_mes * MODEL.tarifa_receiving
    + MODEL.beckett_ordenes_mes * MODEL.beckett_productos_por_orden * MODEL.tarifa_picking
    + MODEL.beckett_ordenes_mes * MODEL.tarifa_packing
    + MODEL.beckett_devoluciones_mes * MODEL.tarifa_returns;

  const revNuevoLista =
      MODEL.beckett_skus_recibidos_mes * s.r
    + MODEL.beckett_ordenes_mes * MODEL.beckett_productos_por_orden * s.pi
    + MODEL.beckett_ordenes_mes * s.pa
    + MODEL.beckett_devoluciones_mes * s.re;

  const delta       = revNuevoLista - revActualLista;
  const deltaAnual  = delta * 12;
  const aumentoPct  = MODEL.beckett_revenue_real > 0 ? delta / MODEL.beckett_revenue_real : 0;

  const roiActual = MODEL.beckett_roi_retail;
  const returnsFeeAnual = MODEL.beckett_devoluciones_mes * s.re * 12;
  const roiNuevo = returnsFeeAnual > 0 ? MODEL.beckett_valor_retail / returnsFeeAnual : 0;

  let reaccion;
  if (aumentoPct <= 0.05) reaccion = 'verde';
  else if (aumentoPct <= 0.15) reaccion = 'amarillo';
  else reaccion = 'rojo';

  return {
    revActualLista, revNuevoLista, delta, deltaAnual, aumentoPct,
    roiActual, roiNuevo, reaccion,
  };
}

// ──────────────── RENDER ROUTER ────────────────
function render() {
  const app = document.getElementById('app');
  switch (state.module) {
    case 'A': renderQuoter(app);   break;
    case 'B': renderPortfolio(app); break;
    case 'C': renderSimulator(app); break;
    case 'D': renderAdmin(app);     break;
  }
  // Pinta estado tab bar
  document.querySelectorAll('.tabbar button').forEach(b => {
    b.classList.toggle('active', b.dataset.module === state.module && state.module !== 'D');
  });
  // Estado botón admin
  const ab = document.getElementById('admin-btn');
  ab.classList.toggle('authed', state.adminAuthed && state.module === 'D');
  document.getElementById('admin-icon').textContent = state.adminAuthed ? '🔓' : '🔒';
  document.getElementById('admin-label').textContent = state.module === 'D' ? 'Salir' : 'Admin';
}

// ──────────────── MÓDULO A — COTIZADOR ────────────────
function renderQuoter(root) {
  const c = calcQuoter();
  const q = state.quoter;

  const negMin = Math.max(0, c.precioMinimo * 0.8);
  const negMax = c.precioIdeal * 1.2;

  const fraseSemaforo = (() => {
    if (c.semaforo === 'verde')
      return `Cerralo. Te deja <strong>${fmt.usd(c.margen)}/mes</strong> limpio (${fmt.pct(c.margenPct)} sobre costo).`;
    if (c.semaforo === 'amarillo')
      return `Negociable. Te deja <strong>${fmt.usd(c.margen)}/mes</strong>. Aspirá al ideal: <strong>${fmt.usd(c.precioIdeal)}</strong>.`;
    return `No lo tomes. Te pierde <strong>${fmt.usd(Math.abs(c.margen))}/mes</strong>. Piso mínimo: <strong>${fmt.usd(c.precioMinimo)}</strong>.`;
  })();

  const estadoSemaforo = { verde: 'Aceptar', amarillo: 'Negociar', rojo: 'Rechazar' }[c.semaforo];

  root.innerHTML = `
    <section class="card">
      <h2>Cotizador Cliente Nuevo</h2>

        </div>
        ${q.site === 'mixto' ? `
          <div style="margin-top:10px;">
            <label>% Miami en mix
              <span class="hint">(default Beckett: 52%)</span></label>
            ${sliderNum('mixto-share', q.mixtoShareMiami*100, 0, 100, 1, '%')}
          </div>
        ` : ''}
      </div>

      <div class="field">
        <label>Tecnología RFID</label>
        <div class="segmented accent" id="seg-rfid">
          <button data-v="1" class="${q.rfid?'active':''}">ON</button>
          <button data-v="0" class="${!q.rfid?'active':''}">OFF</button>
        </div>
        ${!q.rfid ? `<div class="warn-inline">⚠ Recomendado ON: diferenciador vs. competencia.</div>` : ''}
      </div>

      <div class="field">
        <label>Órdenes estimadas / mes</label>
        ${sliderNum('orders', q.orders, 500, 20000, 100)}
      </div>

      <div class="field">
        <label>Productos por orden <span class="hint">(default Beckett: 1.49)</span></label>
        ${sliderNum('ppo', q.ppo, 1.0, 4.0, 0.01)}
      </div>

      <div class="field">
        <label>SKUs recibidos / mes <span class="hint">(default: órdenes × 0.72)</span></label>
        ${sliderNum('srcv', c.srcv, 100, 40000, 100)}
      </div>

      <div class="field">
        <label>% devoluciones <span class="hint">(default Beckett: 12%)</span></label>
        ${sliderNum('rr', q.rrPct*100, 0, 30, 0.5, '%')}
      </div>

      <div class="field">
        <label>Precio del prospecto</label>
        <div class="radio-row" id="price-mode">
          <label class="${q.priceMode==='total'?'active':''}">
            <input type="radio" name="pm" value="total" ${q.priceMode==='total'?'checked':''}/>
            Total mensual
          </label>
          <label class="${q.priceMode==='service'?'active':''}">
            <input type="radio" name="pm" value="service" ${q.priceMode==='service'?'checked':''}/>
            Por servicio
          </label>
        </div>
      </div>

      ${q.priceMode === 'total' ? `
        <div class="field">
          <label>Monto total mensual (USD)</label>
          ${sliderNum('total-price', q.totalPrice, 0, Math.max(40000, c.precioIdeal*1.5), 50, null, '$')}
        </div>
      ` : `
        <div class="field">
          <label>Receiving (tarifa actual $0.60)</label>
          ${sliderNum('t-r', q.tariffs.r, TARIFF_RANGES.r.min, TARIFF_RANGES.r.max, TARIFF_RANGES.r.step, null, '$')}
        </div>
        <div class="field">
          <label>Picking (tarifa actual $0.94)</label>
          ${sliderNum('t-pi', q.tariffs.pi, TARIFF_RANGES.pi.min, TARIFF_RANGES.pi.max, TARIFF_RANGES.pi.step, null, '$')}
        </div>
        <div class="field">
          <label>Packing (tarifa actual $1.92)</label>
          ${sliderNum('t-pa', q.tariffs.pa, TARIFF_RANGES.pa.min, TARIFF_RANGES.pa.max, TARIFF_RANGES.pa.step, null, '$')}
        </div>
        <div class="field">
          <label>Returns (tarifa actual $3.00) ${c.shareMiami < 0.01 ? '— N/A en Bogotá' : ''}</label>
          ${sliderNum('t-re', q.tariffs.re, TARIFF_RANGES.re.min, TARIFF_RANGES.re.max, TARIFF_RANGES.re.step, null, '$')}
        </div>
      `}
    </section>

// Helper que pinta un slider + input numérico sincronizado bidireccional.
function sliderNum(id, value, min, max, step, suffix, prefix, dataKey) {
  const val = (step < 0.1) ? Number(value).toFixed(2) : Math.round(value * 100) / 100;
  const sfx = suffix ? suffix : '';
  const pfxOpen = prefix ? `<div class="num-prefix" data-prefix="${prefix}">` : '';
  const pfxClose = prefix ? `</div>` : '';
  return `
    <div class="slider-row">
      <input type="range" id="sl-${id}" data-key="${dataKey||id}" min="${min}" max="${max}" step="${step}" value="${value}" />
      ${pfxOpen}<input type="number" class="num-input" id="num-${id}" data-key="${dataKey||id}" min="${min}" max="${max}" step="${step}" value="${val}" />${pfxClose}
    </div>
    ${sfx ? `<div style="text-align:right;font-size:11px;color:var(--muted);margin-top:2px;">${sfx}</div>` : ''}
  `;
}

// Wiring del módulo A
function wireQuoter() {
  // Bidirectional sync slider↔numeric
  function bindPair(id, onChange) {
    const sl = document.getElementById('sl-'+id);
    const nb = document.getElementById('num-'+id);
    if (!sl || !nb) return;
    sl.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      nb.value = (sl.step < 0.1) ? v.toFixed(2) : v;
      onChange(v);
    });
    nb.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      if (!isNaN(v)) { sl.value = v; onChange(v); }
    });
  }
  bindPair('orders', v => { state.quoter.orders = v; state.quoter.negSlider = null; render(); });
  bindPair('ppo',    v => { state.quoter.ppo = v; state.quoter.negSlider = null; render(); });
  bindPair('srcv',   v => { state.quoter.srcvOverride = v; state.quoter.negSlider = null; render(); });
  bindPair('rr',     v => { state.quoter.rrPct = v/100; state.quoter.negSlider = null; render(); });
  bindPair('mixto-share', v => { state.quoter.mixtoShareMiami = v/100; state.quoter.negSlider = null; render(); });
  bindPair('total-price', v => { state.quoter.totalPrice = v; state.quoter.negSlider = null; render(); });
  bindPair('t-r',  v => { state.quoter.tariffs.r  = v; state.quoter.negSlider = null; render(); });
  bindPair('t-pi', v => { state.quoter.tariffs.pi = v; state.quoter.negSlider = null; render(); });
  bindPair('t-pa', v => { state.quoter.tariffs.pa = v; state.quoter.negSlider = null; render(); });
  bindPair('t-re', v => { state.quoter.tariffs.re = v; state.quoter.negSlider = null; render(); });
  bindPair('neg',  v => { state.quoter.negSlider = v; render(); });

  // Segmented controls
  document.querySelectorAll('#seg-site button').forEach(b => {
    b.addEventListener('click', () => {
      state.quoter.site = b.dataset.v;
      state.quoter.negSlider = null;
      render();
    });
  });
  document.querySelectorAll('#seg-rfid button').forEach(b => {
    b.addEventListener('click', () => {
      state.quoter.rfid = b.dataset.v === '1';
      state.quoter.negSlider = null;
      render();
    });
  });
  document.querySelectorAll('#price-mode input').forEach(r => {
    r.addEventListener('change', () => {
      state.quoter.priceMode = r.value;
      state.quoter.negSlider = null;
      render();
    });
  });
  const negReset = document.getElementById('neg-reset');
  if (negReset) negReset.addEventListener('click', () => { state.quoter.negSlider = null; render(); });
}

      <p class="card-sub">Afecta los precios Propuesto e Ideal del Módulo A.</p>

      <div class="field">
        <label>Margen Propuesto <span class="hint">(sobre costo total)</span></label>
        ${sliderNum('pol-prop', p.margen_propuesto*100, 0, 50, 1, '%')}
      </div>

      <div class="field">
        <label>Margen Ideal <span class="hint">(sobre costo total)</span></label>
        ${sliderNum('pol-ideal', p.margen_ideal*100, 10, 100, 1, '%')}
      </div>

      <div class="field">
        <label>Participación cliente 2 en gap <span class="hint">(1.0 = absorbe todo)</span></label>
        ${sliderNum('pol-gap', p.participacion_gap, 0, 2, 0.05)}
      </div>
    </section>

    <section class="card">
      <button class="btn-primary" onclick="window.print()">📥 Exportar reporte ejecutivo (imprimir / PDF)</button>
    </section>
  `;

  // Wire policy sliders
  function bindPol(id, key, div) {
    const sl = document.getElementById('sl-'+id);
    const nb = document.getElementById('num-'+id);
    if (!sl || !nb) return;
    sl.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      nb.value = (sl.step < 0.1) ? v.toFixed(2) : v;
      state.policy[key] = v / div; render();
    });
    nb.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      if (!isNaN(v)) { sl.value = v; state.policy[key] = v / div; render(); }
    });
  }
  bindPol('pol-prop', 'margen_propuesto', 100);
  bindPol('pol-ideal','margen_ideal', 100);
  bindPol('pol-gap',  'participacion_gap', 1);
}

function renderPinPad(root) {
  const pin = state.pinEntry;
  root.innerHTML = `
    <section class="card">
      <div class="pin-wrap">
        <h2>🔒 Admin</h2>
        <p style="color:var(--muted); margin-bottom:24px;">Ingresá el PIN de 4 dígitos.</p>
        <div class="pin-dots ${state.pinError?'error':''}">
          ${[0,1,2,3].map(i => `<div class="pin-dot ${pin.length > i ? 'filled' : ''} ${state.pinError?'error':''}">${pin[i] ? '•' : ''}</div>`).join('')}
        </div>
        <div class="pin-grid">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button data-pin="${n}">${n}</button>`).join('')}
          <button class="action" data-pin="clear">Borrar</button>
          <button data-pin="0">0</button>
          <button class="action" data-pin="back">← Volver</button>
        </div>
      </div>
    </section>
  `;

  document.querySelectorAll('[data-pin]').forEach(b => {
    b.addEventListener('click', () => {
      const v = b.dataset.pin;
      state.pinError = false;
      if (v === 'clear') {
        state.pinEntry = '';
      } else if (v === 'back') {
        state.module = 'A'; state.pinEntry = '';
      } else if (state.pinEntry.length < 4) {
        state.pinEntry += v;
        if (state.pinEntry.length === 4) {
          if (state.pinEntry === ADMIN_PIN) {
            state.adminAuthed = true;
            state.pinEntry = '';
          } else {
            state.pinError = true;
            setTimeout(() => { state.pinEntry = ''; state.pinError = false; render(); }, 700);
          }
        }
      }
      render();
    });
  });
}

// ──────────────── TAB BAR + ADMIN BTN ────────────────
document.querySelectorAll('.tabbar button').forEach(b => {
  b.addEventListener('click', () => {
    state.module = b.dataset.module;
    render();
  });
});

document.getElementById('admin-btn').addEventListener('click', () => {
  if (state.module === 'D') {
    // salir del admin
    state.module = 'A';
  } else {
    state.module = 'D';
  }
  render();
});

// ──────────────── INIT ────────────────
render();
</script>
</body>
</html>
