<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Hub — ZenderBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a38;
    --accent: #25d366;
    --accent2: #128c7e;
    --cr: #3b82f6;
    --col: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  .wms-main {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .topbar-title {
    font-size: 14px;
    color: var(--muted);
  }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .line-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 6px;
    padding: 3px;
  }

  .line-btn {
    padding: 5px 12px;
    border-radius: 4px;
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }

  .line-btn.active-cr { background: var(--cr); color: #fff; }
  .line-btn.active-col { background: var(--col); color: #000; }
  .line-btn.active-all { background: var(--accent); color: #000; }

  .btn-mass {
    padding: 6px 14px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-mass:hover { background: var(--accent); color: #000; }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }

  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    flex: 1;
  }

  .search-box input::placeholder { color: var(--muted); }

  .filter-tabs {
    display: flex;
    gap: 4px;
  }

  .filter-tab {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .conv-list {
    flex: 1;
    overflow-y: auto;
  }

  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-track { background: transparent; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .conv-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .conv-info { flex: 1; min-width: 0; }

  .conv-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }

  .conv-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-time {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .conv-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-badges {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }

  .badge {
    font-size: 9px;
    font-family: var(--mono);
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .badge-cr { background: rgba(59,130,246,0.2); color: var(--cr); }
  .badge-col { background: rgba(245,158,11,0.2); color: var(--col); }
  .badge-pending { background: rgba(239,68,68,0.2); color: var(--danger); }
  .badge-unread {
    background: var(--accent);
    color: #000;
    min-width: 18px;
    text-align: center;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 9px;
    margin-left: auto;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
  }

  .chat-contact-info { flex: 1; }
  .chat-contact-name { font-size: 15px; font-weight: 500; }
  .chat-contact-number { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .chat-header-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 65%;
  }

  .msg-row.inbound { align-self: flex-start; }
  .msg-row.outbound { align-self: flex-end; }

  .msg-bubble {
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg-row.inbound .msg-bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  .msg-row.outbound .msg-bubble {
    background: var(--accent2);
    color: #fff;
    border-bottom-right-radius: 3px;
  }

  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg-row.outbound .msg-meta { text-align: right; }

  .msg-status { margin-left: 4px; }
  .msg-status.delivered { color: var(--accent); }
  .msg-status.read { color: var(--cr); }

  .date-divider {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    margin: 8px 0;
    position: relative;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }

  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* INPUT AREA */
  .input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .template-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .template-chip {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }

  .template-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .msg-input:focus { border-color: var(--accent2); }
  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #20b954; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 14px; }
  .empty-sub { font-size: 12px; font-family: var(--mono); }

  /* MASS MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 500px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title { font-size: 15px; font-weight: 500; }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .form-select, .form-input, .form-textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-select:focus, .form-input:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-textarea { resize: vertical; min-height: 80px; }

  .recipients-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .recipient-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .recipient-item input[type=checkbox] { accent-color: var(--accent); }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
  }

  .btn-send-mass {
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #000;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-send-mass:hover { background: #20b954; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
    gap: 8px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONFIG PANEL */
  .config-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 16px;
    z-index: 50;
    overflow-y: auto;
  }

  .config-panel.open { display: flex; }
  .config-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }

  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 200;
    transform: translateY(100px);
    transition: transform 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .notification.show { transform: translateY(0); }
  .notification.success { background: var(--accent); color: #000; }
  .notification.error { background: var(--danger); color: #fff; }
</style>
</head>
<body>
<div class="sidebar" id="wms-sidebar"></div>
<div class="wms-main">

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo">ZenderBox</span>
  <span class="topbar-title">/ WhatsApp Hub</span>
  <div class="topbar-actions">
    <div class="line-toggle">
      <button class="line-btn active-all" onclick="setLine('all', this)">TODAS</button>
      <button class="line-btn" onclick="setLine('cr', this)">🇨🇷 CR</button>
      <button class="line-btn" onclick="setLine('col', this)">🇨🇴 COL</button>
    </div>
    <button class="btn-mass" onclick="loadConversations()">🔄 Cargar</button>
    <button class="btn-mass" onclick="openMassModal()">📤 Envío Masivo</button>
    <button class="icon-btn" onclick="toggleConfig()" title="Configuración">⚙️</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="search-box">
        <span style="color:var(--muted)">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por número o mensaje..." oninput="filterConversations()">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">Todas</button>
        <button class="filter-tab" onclick="setFilter('pending', this)">Pendientes</button>
        <button class="filter-tab" onclick="setFilter('inbound', this)">Sin responder</button>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="loading"><div class="spinner"></div> Cargando conversaciones...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-text">Selecciona una conversación</div>
      <div class="empty-sub">o busca un número específico</div>
    </div>
  </div>
</div>

<!-- CONFIG PANEL -->
<div class="config-panel" id="configPanel">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span class="config-title">⚙️ Configuración</span>
    <button class="icon-btn" onclick="toggleConfig()">✕</button>
  </div>
  <div class="form-group">
    <label class="form-label">Account SID</label>
    <input class="form-input" id="cfgSid" placeholder="ACxxxxxxxxxxxxxxxx">
  </div>
  <div class="form-group">
    <label class="form-label">Auth Token</label>
    <input class="form-input" type="password" id="cfgToken" placeholder="••••••••••••••••">
  </div>
  <div class="form-group">
    <label class="form-label">Número Costa Rica</label>
    <input class="form-input" id="cfgCR" placeholder="+17869461834">
  </div>
  <div class="form-group">
    <label class="form-label">Número Colombia</label>
    <input class="form-input" id="cfgCOL" placeholder="+17864423800">
  </div>
  <button class="btn-send-mass" onclick="saveConfig()" style="width:100%">💾 Guardar</button>
  <button class="btn-send-mass" onclick="loadConversations()" style="width:100%;background:var(--accent2)">🔄 Cargar Conversaciones</button>
  <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:8px">
    Las credenciales se guardan en localStorage del navegador.
  </div>
</div>

<!-- MASS MODAL -->
<div class="modal-overlay" id="massModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📤 Envío Masivo WhatsApp</span>
      <button class="icon-btn" onclick="closeMassModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Línea de envío</label>
        <select class="form-select" id="massLine">
          <option value="cr">🇨🇷 Costa Rica (+17869461834)</option>
          <option value="col">🇨🇴 Colombia (+17864423800)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Template</label>
        <select class="form-select" id="massTemplate" onchange="updateTemplatePreview()">
          <option value="HX6d1500b7e3259ec339359edf6e0098a1">pago_pendiente</option>
          <option value="HXfc43f36de2839ad9923e198cb923eeb1">cr_ubicacion</option>
          <option value="HX882a4d2fdd6f1cae008ea78ad3729e6b">welcome_cri</option>
          <option value="HXe2a3e0652175431516ea9822d21a4836">bienvenida_casillero</option>
          <option value="HX2f4384b3b732488e9b9d06d5c6ea2954">all_hola</option>
          <option value="HX3865827f6d17f88792e0c0f665caafc6">estatus_message</option>
          <option value="HXc9e807ea9f419ba75ce62074bf6f7932">welcome_pa</option>
          <option value="HX354a68f212a1dd6da2738b532b8d4420">welcome_pobox</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Destinatarios (uno por línea, formato +57...)</label>
        <textarea class="form-textarea" id="massRecipients" placeholder="+573001234567&#10;+506XXXXXXXX&#10;+1786XXXXXXX" rows="5"></textarea>
      </div>
      <div id="massPreview" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px;color:var(--muted)">
        Selecciona un template para ver la vista previa
      </div>
      <div id="massStatus" style="font-size:12px;font-family:var(--mono);color:var(--muted)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMassModal()">Cancelar</button>
      <button class="btn-send-mass" onclick="sendMass()">📤 Enviar a todos</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notification" id="notification"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const TEMPLATES = {
  'HX6d1500b7e3259ec339359edf6e0098a1': { name: 'pago_pendiente', body: 'Hola como estas? te escribimos ya que tenemos que programar la entrega de tu orden pero tienes un pago pendiente y hasta que no este confirmado tu paquete no saldrá a despacho' },

  'HX882a4d2fdd6f1cae008ea78ad3729e6b': { name: 'welcome_cri', body: 'Bienvenida Costa Rica' },
  'HXe2a3e0652175431516ea9822d21a4836': { name: 'bienvenida_casillero', body: 'Bienvenida casillero' },
  'HX2f4384b3b732488e9b9d06d5c6ea2954': { name: 'all_hola', body: 'Hola! ¿Cómo estás?' },
  'HX3865827f6d17f88792e0c0f665caafc6': { name: 'estatus_message', body: 'Mensaje de estatus de tu paquete' },
  'HXc9e807ea9f419ba75ce62074bf6f7932': { name: 'welcome_pa', body: 'Bienvenida Panamá' },
  'HX354a68f212a1dd6da2738b532b8d4420': { name: 'welcome_pobox', body: 'Bienvenida PO Box' },
};

const NUMBERS = {
  cr: '+17869461834',
  col: '+17864423800'

// ─── STATE ────────────────────────────────────────────────────────────────────
let config = {
  sid: localStorage.getItem('zb_sid') || '',
  token: localStorage.getItem('zb_token') || '',
  cr: localStorage.getItem('zb_cr') || '+17869461834',
  col: localStorage.getItem('zb_col') || '+17864423800'
};

let conversations = {};
let activeConv = null;
let currentFilter = 'all';
let currentLine = 'all';

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cfgSid').value = config.sid;
  document.getElementById('cfgToken').value = config.token;
  document.getElementById('cfgCR').value = config.cr;
  document.getElementById('cfgCOL').value = config.col;

  if (config.sid && config.token) {
    loadConversations();
  } else {
    document.getElementById('convList').innerHTML = `
      <div class="loading" style="flex-direction:column;gap:8px">
        <span style="font-size:24px">⚙️</span>
        <span>Configura tus credenciales</span>
        <button class="btn-mass" onclick="toggleConfig()">Abrir configuración</button>
      </div>`;
  }

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function saveConfig() {
  config.sid = document.getElementById('cfgSid').value.trim();
  config.token = document.getElementById('cfgToken').value.trim();
  config.cr = document.getElementById('cfgCR').value.trim();
  config.col = document.getElementById('cfgCOL').value.trim();
  localStorage.setItem('zb_sid', config.sid);
  localStorage.setItem('zb_token', config.token);
  localStorage.setItem('zb_cr', config.cr);
  localStorage.setItem('zb_col', config.col);
  showNotification('✅ Configuración guardada', 'success');
}

function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('open');
}

// ─── TWILIO API ───────────────────────────────────────────────────────────────
function twilioAuth() {
  return 'Basic ' + btoa(config.sid + ':' + config.token);
}

async function twilioFetch(url) {
  const res = await fetch('https://api.twilio.com' + url, {
    headers: { 'Authorization': twilioAuth() }
  });
  if (!res.ok) throw new Error('API Error: ' + res.status);
  return res.json();
}

async function loadConversations() {
  document.getElementById('convList').innerHTML = '<div class="loading"><div class="spinner"></div> Cargando...</div>';
  try {
    const res = await fetch('https://zenderbox.app.n8n.cloud/webhook/cr-wa-hub-conversaciones');
    const data = await res.json();
    conversations = {};
    for (const conv of data.conversaciones) {
      conversations[conv.contact] = conv;
    }
    renderConvList();
    showNotification(`✅ ${data.total} conversaciones cargadas`, 'success');
  } catch(e) {
    document.getElementById('convList').innerHTML = `<div class="loading" style="color:var(--danger)">❌ Error: ${e.message}</div>`;
  }
}

// ─── RENDER CONVERSATIONS ─────────────────────────────────────────────────────
function renderConvList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('convList');

  let convs = Object.values(conversations);

  // Filter by line
  if (currentLine !== 'all') {
    convs = convs.filter(c => c.line === currentLine);
  }

  // Filter by status
  if (currentFilter === 'pending') {
    convs = convs.filter(c => c.lastMsg && c.lastMsg.direction === 'inbound');
  } else if (currentFilter === 'inbound') {
    convs = convs.filter(c => c.lastMsg && c.lastMsg.direction === 'inbound');
  }

  // Search
  if (search) {
    convs = convs.filter(c =>
      c.contact.includes(search) ||
      (c.lastMsg && c.lastMsg.body && c.lastMsg.body.toLowerCase().includes(search))
    );
  }

  // Sort by date
  convs.sort((a, b) => new Date(b.lastMsg?.date_created || 0) - new Date(a.lastMsg?.date_created || 0));

  if (convs.length === 0) {
    list.innerHTML = '<div class="loading">Sin conversaciones</div>';
    return;
  }

  list.innerHTML = convs.map(conv => {
    const initials = conv.contact.slice(-2);
    const colors = ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981', '#ef4444'];
    const color = colors[parseInt(conv.contact.slice(-1)) % colors.length];
    const isPending = conv.lastMsg && conv.lastMsg.direction === 'inbound';
    const isActive = activeConv === conv.contact;
    const preview = conv.lastMsg ? (conv.lastMsg.body || '[media]').slice(0, 45) : '';
    const time = conv.lastMsg ? formatTime(conv.lastMsg.date_created) : '';

    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="openConversation('${conv.contact}')">
        <div class="conv-avatar" style="background:${color}22;color:${color}">${initials}</div>
        <div class="conv-info">
          <div class="conv-header">
            <span class="conv-name">${conv.contact}</span>
            <span class="conv-time">${time}</span>
          </div>
          <div class="conv-preview">${conv.lastMsg?.direction === 'outbound-api' ? '↗ ' : '↙ '}${preview}</div>
          <div class="conv-badges">
            <span class="badge badge-${conv.linea?.toLowerCase()}">${conv.linea}</span>
            ${isPending ? '<span class="badge badge-pending">SIN RESPONDER</span>' : ''}
          </div>
        </div>
        ${conv.unread > 0 ? `<span class="badge-unread">${conv.unread}</span>` : ''}
      </div>`;
  }).join('');
}

// ─── OPEN CONVERSATION ────────────────────────────────────────────────────────
async function openConversation(contact) {
  activeConv = contact;
  const conv = conversations[contact];
  if (!conv) return;

  // Reset unread
  conv.unread = 0;
  renderConvList();

  const colors = ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981', '#ef4444'];
  const color = colors[parseInt(contact.slice(-1)) % colors.length];

  // Render chat structure with spinner while loading
  document.getElementById('chatArea').innerHTML = `
    <div class="chat-header">
      <div class="chat-avatar" style="background:${color}22;color:${color}">${contact.slice(-2)}</div>
      <div class="chat-contact-info">
        <div class="chat-contact-name">${contact}</div>
        <div class="chat-contact-number" id="chatContactNumber">${conv.linea === 'CR' ? '🇨🇷 Costa Rica' : '🇨🇴 Colombia'} · cargando...</div>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" onclick="openConversation('${contact}')" title="Refrescar">🔄</button>
      </div>
    </div>
    <div class="messages" id="msgContainer"><div class="loading"><div class="spinner"></div> Cargando mensajes...</div></div>
    <div class="input-area">
      <div class="template-bar" id="templateBar">
        ${Object.entries(TEMPLATES).slice(0,5).map(([sid, t]) =>
          `<button class="template-chip" onclick="sendTemplate('${contact}', '${sid}', '${conv.linea}')">${t.name}</button>`
        ).join('')}
        <button class="template-chip" onclick="toggleAllTemplates('${contact}', '${conv.linea}')">+ más</button>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Escribe un mensaje... (solo dentro de la ventana de 24h)" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage('${contact}','${conv.linea}')}"></textarea>
        <button class="send-btn" onclick="sendMessage('${contact}','${conv.linea}')">➤</button>
      </div>
    </div>`;

  // Fetch full message thread from n8n
  try {
    const res = await fetch('https://zenderbox.app.n8n.cloud/webhook/cr-wa-hub-mensajes?contacto=' + encodeURIComponent(contact));
    const data = await res.json();
    conv.messages = data.mensajes || [];
    if (data.linea) conv.linea = data.linea;
    const mc = document.getElementById('msgContainer');
    if (mc) mc.innerHTML = renderMessages(conv.messages);
    const info = document.getElementById('chatContactNumber');
    if (info) info.textContent = `${conv.linea === 'CR' ? '🇨🇷 Costa Rica' : '🇨🇴 Colombia'} · ${conv.messages.length} mensajes`;
  } catch(e) {
    const mc = document.getElementById('msgContainer');
    if (mc) mc.innerHTML = `<div class="loading" style="color:var(--danger)">❌ Error: ${e.message}</div>`;
  }

  // Scroll to bottom
  setTimeout(() => {
    const mc = document.getElementById('msgContainer');
    if (mc) mc.scrollTop = mc.scrollHeight;
  }, 50);
}

function renderMessages(messages) {
  const sorted = [...messages].sort((a, b) => new Date(a.date_created) - new Date(b.date_created));
  let lastDate = '';
  let html = '';

  for (const msg of sorted) {
    const date = new Date(msg.date_created).toLocaleDateString('es', {day:'numeric', month:'short', year:'numeric'});
    if (date !== lastDate) {
      html += `<div class="date-divider">${date}</div>`;
      lastDate = date;
    }

    const isInbound = msg.direction === 'inbound';
    const isOutbound = msg.direction === 'outbound-api' || msg.direction === 'outbound-reply';
    const time = new Date(msg.date_created).toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
    const statusIcon = msg.status === 'delivered' ? '✓✓' : msg.status === 'read' ? '✓✓' : '✓';
    const statusClass = msg.status === 'read' ? 'read' : msg.status === 'delivered' ? 'delivered' : '';

    html += `
      <div class="msg-row ${isInbound ? 'inbound' : 'outbound'}">
        <div class="msg-bubble">${escapeHtml(msg.body || '[media]')}</div>
        <div class="msg-meta">
          ${time}
          ${!isInbound ? `<span class="msg-status ${statusClass}">${statusIcon}</span>` : ''}
        </div>
      </div>`;
  }

  return html || '<div class="loading" style="color:var(--muted)">Sin mensajes</div>';
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage(contact, line) {
  const input = document.getElementById('msgInput');
  const body = input.value.trim();
  if (!body) return;

  input.value = '';
  const from = 'whatsapp:' + config[line];
  const to = 'whatsapp:' + contact;

  try {
    const formData = new URLSearchParams();
    formData.append('From', from);
    formData.append('To', to);
    formData.append('Body', body);

    const res = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${config.sid}/Messages.json`, {
      method: 'POST',
      headers: {
        'Authorization': twilioAuth(),
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: formData
    });

    const data = await res.json();
    if (data.sid) {
      // Add to local conversation
      if (!conversations[contact]) conversations[contact] = { contact, line, messages: [], lastMsg: null, unread: 0 };
      conversations[contact].messages.push(data);
      conversations[contact].lastMsg = data;
      openConversation(contact);
      showNotification('✅ Mensaje enviado', 'success');
    } else {
      showNotification('❌ ' + (data.message || 'Error enviando'), 'error');
    }
  } catch (e) {
    showNotification('❌ Error: ' + e.message, 'error');
  }
}

async function sendTemplate(contact, contentSid, line) {
  const from = 'whatsapp:' + config[line];
  const to = 'whatsapp:' + contact;

  try {
    const formData = new URLSearchParams();
    formData.append('From', from);
    formData.append('To', to);
    formData.append('ContentSid', contentSid);

    const res = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${config.sid}/Messages.json`, {
      method: 'POST',
      headers: {
        'Authorization': twilioAuth(),
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: formData
    });

    const data = await res.json();
    if (data.sid) {
      if (!conversations[contact]) conversations[contact] = { contact, line, messages: [], lastMsg: null, unread: 0 };
      conversations[contact].messages.push({...data, body: TEMPLATES[contentSid]?.body || 'Template enviado'});
      conversations[contact].lastMsg = data;
      openConversation(contact);
      showNotification('✅ Template enviado', 'success');
    } else {
      showNotification('❌ ' + (data.message || 'Error'), 'error');
    }
  } catch (e) {
    showNotification('❌ Error: ' + e.message, 'error');
  }
}

// ─── MASS SEND ────────────────────────────────────────────────────────────────
function openMassModal() { document.getElementById('massModal').classList.add('open'); }
function closeMassModal() { document.getElementById('massModal').classList.remove('open'); }

function updateTemplatePreview() {
  const sid = document.getElementById('massTemplate').value;
  const tmpl = TEMPLATES[sid];
  document.getElementById('massPreview').innerHTML = tmpl
    ? `<strong style="color:var(--accent);font-family:var(--mono);font-size:11px">${tmpl.name}</strong><br><br>${tmpl.body}`
    : 'Template no encontrado';
}

async function sendMass() {
  const line = document.getElementById('massLine').value;
  const contentSid = document.getElementById('massTemplate').value;
  const recipientsRaw = document.getElementById('massRecipients').value.trim();
  const recipients = recipientsRaw.split('\n').map(r => r.trim()).filter(r => r.startsWith('+'));

  if (recipients.length === 0) {
    showNotification('⚠️ Agrega destinatarios', 'error');
    return;
  }

  const statusEl = document.getElementById('massStatus');
  statusEl.textContent = `Enviando a ${recipients.length} contactos...`;

  let success = 0, failed = 0;

  for (const recipient of recipients) {
    try {
      const formData = new URLSearchParams();
      formData.append('From', 'whatsapp:' + config[line]);
      formData.append('To', 'whatsapp:' + recipient);
      formData.append('ContentSid', contentSid);

      const res = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${config.sid}/Messages.json`, {
        method: 'POST',
        headers: { 'Authorization': twilioAuth(), 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });

      const data = await res.json();
      if (data.sid) success++;
      else failed++;
    } catch { failed++; }

    statusEl.textContent = `✅ ${success} enviados · ❌ ${failed} fallidos de ${recipients.length}`;
    await new Promise(r => setTimeout(r, 500)); // rate limit
  }

  showNotification(`✅ Masivo: ${success} enviados, ${failed} fallidos`, 'success');
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderConvList();
}

function setLine(line, btn) {
  currentLine = line;
  document.querySelectorAll('.line-btn').forEach(b => {
    b.className = 'line-btn';
  });
  if (line === 'all') btn.classList.add('active-all');
  else if (line === 'cr') btn.classList.add('active-cr');
  else btn.classList.add('active-col');
  renderConvList();
}

function filterConversations() { renderConvList(); }

// ─── UTILS ────────────────────────────────────────────────────────────────────
function formatTime(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('es', {weekday:'short'});
  return d.toLocaleDateString('es', {day:'numeric', month:'short'});
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showNotification(msg, type) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = `notification ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

updateTemplatePreview();
document.addEventListener('DOMContentLoaded', loadConversations);
</script>
