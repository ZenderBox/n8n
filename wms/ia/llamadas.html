<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenderBox · Llamadas IA CR</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg: #040d18;
        --surface: #081F3A;
        --surface2: #0d2748;
        --border: #0f3058;
        --border2: #1a4575;
        --accent: #CCD32A;
        --accent-dim: rgba(204, 211, 42, 0.12);
        --blue: #009CC9;
        --blue-dim: rgba(0, 156, 201, 0.12);
        --green: #22c55e;
        --green-dim: rgba(34, 197, 94, 0.1);
        --red: #ef4444;
        --red-dim: rgba(239, 68, 68, 0.1);
        --yellow: #f59e0b;
        --yellow-dim: rgba(245, 158, 11, 0.1);
        --purple: #a78bfa;
        --text: #e8f0f8;
        --text-muted: #5a7a9a;
        --text-mid: #8aaac8;
        --mono: 'IBM Plex Mono', monospace;
        --sans: 'IBM Plex Sans', sans-serif;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
    }

    .sidebar {
        width: 220px;
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 10;
    }

    .sidebar-logo {
        padding: 24px 20px 20px;
        border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .zb {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 2px;
    }

    .sidebar-logo h2 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
    }

    .sidebar-logo .country {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .nav-section {
        padding: 16px 12px 8px;
    }

    .nav-section-label {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 0 8px;
        margin-bottom: 4px;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 6px;
        transition: all 0.15s;
        margin-bottom: 2px;
        border: 1px solid transparent;
        text-decoration: none;
    }

    .nav-item:hover {
        background: var(--surface2);
    }

    .nav-item.active {
        background: var(--accent-dim);
        border-color: rgba(245, 166, 35, 0.2);
    }

    .nav-icon {
        font-size: 14px;
        flex-shrink: 0;
    }

    .nav-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-mid);
    }

    .nav-item.active .nav-label {
        color: var(--accent);
    }

    .nav-coming {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        padding: 2px 6px;
        background: var(--surface2);
        border-radius: 3px;
        margin-left: auto;
    }

    .nav-back {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        text-decoration: none;
        transition: color .15s;
    }

    .nav-back:hover {
        color: var(--accent);
    }

    .sidebar-footer {
        margin-top: auto;
        padding: 16px 20px;
        border-top: 1px solid var(--border);
    }

    .sidebar-footer .version {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
    }

    .main {
        margin-left: 220px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .topbar {
        padding: 16px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 5;
    }

    .topbar-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
    }

    .topbar-sub {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
    }

    .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .topbar-live {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--green);
    }

    .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% {
            opacity:1
        }

        50% {
            opacity: 0.4
        }
    }

    .btn-refresh {
        background: transparent;
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 6px 12px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all .15s;
    }

    .btn-refresh:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    .content {
        padding: 28px 32px;
        flex: 1;
    }

    .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 24px;
    }

    .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 20px;
    }

    .stat-label {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -1px;
    }

    .stat-value.green {
        color: var(--green);
    }

    .stat-value.yellow {
        color: var(--yellow);
    }

    .stat-value.blue {
        color: var(--blue);
    }

    .stat-sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 4px;
    }

    .filters-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
    }

    .filter-btn {
        padding: 6px 14px;
        border: 1px solid var(--border2);
        border-radius: 20px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--text-muted);
        transition: all 0.15s;
    }

    .filter-btn.active {
        background: var(--accent-dim);
        border-color: rgba(245, 166, 35, 0.4);
        color: var(--accent);
    }

    .filter-btn.f-blue.active {
        background: var(--blue-dim);
        border-color: rgba(79, 142, 247, 0.4);
        color: var(--blue);
    }

    .filter-btn.f-yellow.active {
        background: var(--yellow-dim);
        border-color: rgba(245, 158, 11, 0.4);
        color: var(--yellow);
    }

    .filter-btn.f-green.active {
        background: var(--green-dim);
        border-color: rgba(34, 197, 94, 0.4);
        color: var(--green);
    }

    .filter-search {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 6px 12px;
    }

    .filter-search input {
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text);
        width: 180px;
    }

    .filter-search input::placeholder {
        color: var(--text-muted);
    }

    .cons-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .cons-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        transition: border-color 0.15s;
    }

    .cons-card:hover, .cons-card.expanded {
        border-color: var(--border2);
    }

    .cons-header {
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        user-select: none;
    }

    .cons-expand-icon {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.2s;
        flex-shrink: 0;
    }

    .cons-card.expanded .cons-expand-icon {
        transform: rotate(90deg);
    }

    .cons-id {
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        min-width: 80px;
    }

    .cons-status-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 12px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        flex-shrink: 0;
    }

    .cons-status-pill.bodega {
        background: var(--blue-dim);
        color: var(--blue);
        border: 1px solid rgba(79, 142, 247, 0.25);
    }

    .cons-status-pill.transito {
        background: var(--yellow-dim);
        color: var(--yellow);
        border: 1px solid rgba(245, 158, 11, 0.25);
    }

    .cons-status-pill.miami {
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid rgba(245, 166, 35, 0.25);
    }

    .cons-status-pill.entregado {
        background: var(--green-dim);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .cons-status-pill.retraso {
        background: var(--red-dim);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .cons-status-pill.aeropuerto {
        background: rgba(167, 139, 250, 0.1);
        color: var(--purple);
        border: 1px solid rgba(167, 139, 250, 0.25);
    }

    .cons-status-pill.pendiente {
        background: var(--surface2);
        color: var(--text-muted);
        border: 1px solid var(--border2);
    }

    .cons-chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
    }

    .chip.total {
        background: var(--surface2);
        color: var(--text-mid);
    }

    .chip.pagadas {
        background: var(--green-dim);
        color: var(--green);
    }

    .chip.desp {
        background: var(--blue-dim);
        color: var(--blue);
    }

    .chip.sinpago {
        background: var(--yellow-dim);
        color: var(--yellow);
    }

    .cons-flight {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
        flex-shrink: 0;
    }

    .flight-step {
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: var(--mono);
        font-size: 10px;
    }

    .flight-step .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
    }

    .flight-step .dot.ok {
        background: var(--green);
    }

    .flight-step .dot.no {
        background: var(--border2);
    }

    .flight-step .dot.cur {
        background: var(--yellow);
        box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
    }

    .flight-step span {
        color: var(--text-muted);
    }

    .flight-arrow {
        color: var(--text-muted);
        font-size: 10px;
    }

    .guias-table-wrap {
        border-top: 1px solid var(--border);
    }

    .guias-table {
        width: 100%;
        border-collapse: collapse;
    }

    .guias-table th {
        padding: 10px 14px;
        text-align: left;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
    }

    .guias-table td {
        padding: 10px 14px;
        font-size: 12px;
        border-bottom: 1px solid var(--border);
    }

    .guias-table tr:last-child td {
        border-bottom: none;
    }

    .guias-table tr:hover td {
        background: rgba(255, 255, 255, 0.02);
    }

    .td-guia {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent);
        cursor: pointer;
    }

    .td-guia:hover {
        text-decoration: underline;
    }

    .td-cliente {
        color: var(--text);
        font-weight: 500;
    }

    .td-tel {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-mid);
    }

    .td-cob {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
    }

    .btn-wa {
        background: #25D366;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 3px 7px;
        font-size: 12px;
        cursor: pointer;
        transition: opacity 0.15s;
    }
    .btn-wa:hover { opacity: 0.85; }
    .btn-wa:disabled { opacity: 0.4; cursor: not-allowed; }

    .agency-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
    }
    .agency-lbl {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .agency-toggle {
        display: flex;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 4px;
        overflow: hidden;
    }
    .agency-btn {
        padding: 6px 20px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
        color: var(--text-muted);
    }
    .agency-btn.active {
        background: var(--accent);
        color: #000;
    }
    .agency-count {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
        margin-left: 4px;
    }

    .badge-sm {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
    }

    .badge-sm.pagado {
        background: var(--green-dim);
        color: var(--green);
    }

    .badge-sm.sinpago {
        background: var(--yellow-dim);
        color: var(--yellow);
    }

    .badge-sm.pendiente {
        background: var(--surface2);
        color: var(--text-muted);
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 0;
        gap: 12px;
    }

    .empty-icon {
        font-size: 40px;
        opacity: 0.3;
    }

    .empty-text {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text-muted);
    }

    @keyframes spin {
        to {
            transform: rotate(360deg)
        }
    }

    .detail-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 50;
    }

    .detail-overlay.visible {
        display: block;
    }

    .detail-panel {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: 480px;
        background: var(--surface);
        border-left: 1px solid var(--border2);
        z-index: 51;
        overflow-y: auto;
        transform: translateX(100%);
        transition: transform 0.25s ease;
    }

    .detail-panel.visible {
        transform: translateX(0);
    }

    .detail-panel-hdr {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        background: var(--surface);
    }

    .detail-panel-hdr h3 {
        font-family: var(--mono);
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        flex: 1;
    }

    .btn-close {
        background: transparent;
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
    }

    .btn-close:hover {
        border-color: var(--red);
        color: var(--red);
    }

    .detail-body {
        padding: 20px 24px;
    }

    .detail-section {
        margin-bottom: 20px;
    }

    .detail-section-title {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
    }

    .detail-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 6px 0;
    }

    .detail-lbl {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        min-width: 110px;
        flex-shrink: 0;
    }

    .detail-val {
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
    }

    .detail-val.mono {
        font-family: var(--mono);
        font-size: 12px;
    }

    .detail-val.green {
        color: var(--green);
    }

    .c-tl {
        display: flex;
        flex-direction: column;
    }

    .c-tl-item {
        display: flex;
        gap: 10px;
        padding: 8px 0;
    }

    .c-tl-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 20px;
        flex-shrink: 0;
    }

    .c-tl-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 2px solid var(--border2);
        background: var(--surface2);
        flex-shrink: 0;
    }

    .c-tl-dot.done {
        background: var(--green);
        border-color: var(--green);
    }

    .c-tl-dot.active {
        background: var(--accent);
        border-color: var(--accent);
    }

    .c-tl-line {
        flex: 1;
        width: 2px;
        background: var(--border2);
        margin: 2px 0;
    }

    .c-tl-line.done {
        background: rgba(34, 197, 94, 0.3);
    }

    .c-tl-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
    }

    .c-tl-title.muted {
        color: var(--text-muted);
    }

    .c-tl-date {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 1px;
    }
    </style>
</head>
<body>
    <div class="sidebar" id="wms-sidebar"></div>
    <div class="main">
        <div class="topbar">
            <div>
                <div class="topbar-title">Llamadas IA</div>
                <div class="topbar-sub" id="cons-sub">Monitoreo de casilleros · Agente Dapta</div>
            </div>
            <div class="topbar-right">
                <button class="btn-refresh" onclick="fetchData()">↻ ACTUALIZAR</button>
                <div class="topbar-live">
                    <div class="live-dot"></div>
                    CONECTADO
                </div>
            </div>
        </div>
        <div class="content">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Total CR</div>
                    <div class="stat-value blue" id="stat-total">—</div>
                    <div class="stat-sub">casilleros activos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Llamados</div>
                    <div class="stat-value" id="stat-llamados">—</div>
                    <div class="stat-sub">con llamada registrada</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Contestaron</div>
                    <div class="stat-value green" id="stat-contestaron">—</div>
                    <div class="stat-sub">respondieron la llamada</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">No contestaron</div>
                    <div class="stat-value yellow" id="stat-nocontestaron">—</div>
                    <div class="stat-sub">pendientes de reintento</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sin llamada</div>
                    <div class="stat-value" id="stat-sinllamada" style="color:var(--text-muted)">—</div>
                    <div class="stat-sub">nuevos sin contactar</div>
                </div>
            </div>
            <div class="filters-row">
                <button class="filter-btn active" id="f-todos" onclick="setFilter('todos')">TODOS</button>
                <button class="filter-btn f-green" id="f-contesto" onclick="setFilter('contesto')">✓ CONTESTARON</button>
                <button class="filter-btn f-yellow" id="f-nocontesto" onclick="setFilter('nocontesto')">⚠ NO CONTESTARON</button>
                <button class="filter-btn f-blue" id="f-sinllamada" onclick="setFilter('sinllamada')">📞 SIN LLAMADA</button>
                <div class="filter-search">
                    <span style="color:var(--text-muted);font-size:13px">⌕</span>
                    <input id="filterSearch" placeholder="Buscar casillero, nombre..." oninput="renderList()">
                </div>
            </div>
            <div class="cons-list" id="consList">
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <div class="empty-text">Cargando...</div>
                </div>
            </div>
        </div>
    </div>
    <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-panel-hdr">
            <h3 id="dp-guia">—</h3>
            <button class="btn-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-body" id="dp-body"></div>
    </div>
    <script>
    const WEBHOOK_URL = 'https://zenderbox.app.n8n.cloud/webhook/llamadas-data';
    let CASILLEROS = [];
    let currentFilter = 'todos';
    let currentAgencia = 'cr';  // 'cr' | 'col'



    function filteredByAgencia() {
        const pais = currentAgencia === 'cr' ? 'Costa Rica' : 'Colombia';
        return CASILLEROS.filter(c => c.pais === pais);
    }

    function updateAgenciaStats() {
        const list = filteredByAgencia();
        const r = {
            total:         list.length,
            conLlamada:    list.filter(c => c.call_id).length,
            contestaron:   list.filter(c => c.contesto).length,
            noContestaron: list.filter(c => c.call_id && !c.contesto).length,
            sinLlamada:    list.filter(c => c.sin_llamada).length
        };
        const safe = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
        safe('stat-total',          r.total);
        safe('stat-llamados',       r.conLlamada);
        safe('stat-contestaron',    r.contestaron);
        safe('stat-nocontestaron',  r.noContestaron);
        safe('stat-sinllamada',     r.sinLlamada);

    }
    function nQ(s) { return String(s || '').trim().toUpperCase(); }

    async function fetchData() {
        document.getElementById('cons-sub').textContent = 'Actualizando...';
        try {
            const res  = await fetch(WEBHOOK_URL + '?t=' + Date.now());
            const json = await res.json();
            if (!json.ok) throw new Error('Error en workflow');
            CASILLEROS = json.casilleros || [];
            updateAgenciaStats();
            document.getElementById('cons-sub').textContent = `Monitoreo de casilleros · Actualizado: ${new Date().toLocaleTimeString('es-CR')}`;
            renderList();
        } catch(err) {
            document.getElementById('consList').innerHTML = `<div style="padding:24px;background:var(--red-dim);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-family:var(--mono);font-size:12px;color:var(--red)">✕ ${err.message} <button onclick="fetchData()" style="margin-left:12px;background:var(--accent);border:none;border-radius:4px;padding:6px 12px;font-family:var(--mono);font-size:11px;font-weight:600;color:#000;cursor:pointer">↻ Reintentar</button></div>`;
        }
    }

    function setFilter(f) {
        currentFilter = f;
        ['todos','contesto','nocontesto','sinllamada'].forEach(id => document.getElementById('f-' + id).classList.toggle('active', id === f));
        renderList();
    }

    function badgeContesto(contesto, callId) {
        if (!callId) return '<span class="badge-sm pendiente">SIN LLAMADA</span>';
        return contesto
            ? '<span class="badge-sm pagado">CONTESTÓ</span>'
            : '<span class="badge-sm sinpago">NO CONTESTÓ</span>';
    }

    function badgeSentimiento(s) {
        if (!s) return '—';
        const v = s.toLowerCase();
        if (v === 'positive')  return '<span class="badge-sm" style="background:var(--green-dim);color:var(--green)">😊 Positivo</span>';
        if (v === 'negative')  return '<span class="badge-sm" style="background:var(--red-dim);color:var(--red)">😞 Negativo</span>';
        if (v === 'neutral')   return '<span class="badge-sm" style="background:var(--blue-dim);color:var(--blue)">😐 Neutral</span>';
        return `<span class="badge-sm pendiente">${s}</span>`;
    }

    function renderList() {
        const search = (document.getElementById('filterSearch').value || '').toLowerCase();
        const agList  = filteredByAgencia();
        const filtered = agList.filter(c => {
            if (currentFilter === 'contesto'   && (!c.call_id || !c.contesto))  return false;
            if (currentFilter === 'nocontesto' && (!c.call_id || c.contesto))   return false;
            if (currentFilter === 'sinllamada' && c.call_id)                    return false;
            if (search && !c.casillero.toLowerCase().includes(search) &&
                          !c.nombre.toLowerCase().includes(search) &&
                          !c.telefono.toLowerCase().includes(search)) return false;
            return true;
        });

        const list = document.getElementById('consList');
        if (!filtered.length) {
            list.innerHTML = '<div class="empty-state"><div class="empty-icon">📞</div><div class="empty-text">Sin resultados</div></div>';
            return;
        }

        list.innerHTML = `<div style="overflow-x:auto"><table class="guias-table" style="width:100%">
            <thead><tr>
                <th>CASILLERO</th><th>NOMBRE</th><th>TELÉFONO</th><th>CIUDAD</th>
                <th>PERFIL</th><th>LLAMADA</th><th>SENTIMIENTO</th>
                <th>INTENTOS</th><th>FECHA</th><th>GRABACIÓN</th>
            </tr></thead>
            <tbody>${filtered.map(c => `<tr onclick="openDetail('${c.casillero}')" style="cursor:pointer">
                <td class="td-guia">${c.casillero || '—'}</td>
                <td class="td-cliente">${c.nombre} ${c.apellido}</td>
                <td class="td-tel">${c.telefono || '—'}</td>
                <td class="td-cob">${c.ciudad || '—'}</td>
                <td>${c.perfil_completo ? '<span class="badge-sm pagado">COMPLETO</span>' : '<span class="badge-sm sinpago">INCOMPLETO</span>'}</td>
                <td>${badgeContesto(c.contesto, c.call_id)}</td>
                <td>${badgeSentimiento(c.sentimiento)}</td>
                <td class="td-cob" style="text-align:center">${c.intentos || '—'}</td>
                <td class="td-cob">${c.fecha_llamada ? c.fecha_llamada.substring(0,10) : '—'}</td>
                <td>${c.grabacion ? `<a href="${c.grabacion}" target="_blank" style="color:var(--blue);font-size:11px;font-family:var(--mono)">▶ Ver</a>` : '—'}</td>
            </tr>`).join('')}
            </tbody></table></div>`;
    }

    function openDetail(casillero) {
        const c = CASILLEROS.find(x => x.casillero === casillero);
        if (!c) return;
        document.getElementById('dp-guia').textContent = casillero;
        document.getElementById('dp-body').innerHTML = `
        <div class="detail-section"><div class="detail-section-title">Cliente</div>
            <div class="detail-row"><span class="detail-lbl">Nombre</span><span class="detail-val">${c.nombre} ${c.apellido}</span></div>
            <div class="detail-row"><span class="detail-lbl">Teléfono</span><span class="detail-val mono">${c.telefono || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Email</span><span class="detail-val">${c.email || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Ciudad</span><span class="detail-val">${c.ciudad || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Agencia</span><span class="detail-val">${c.agencia || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Perfil</span><span class="detail-val">${c.perfil_completo ? '✅ Completo' : '⚠️ Incompleto'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Fecha registro</span><span class="detail-val">${c.fecha_creacion || '—'}</span></div>
        </div>
        <div class="detail-section"><div class="detail-section-title">Llamada IA</div>
            <div class="detail-row"><span class="detail-lbl">Call ID</span><span class="detail-val mono">${c.call_id || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Fecha</span><span class="detail-val">${c.fecha_llamada || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Contestó</span><span class="detail-val">${c.contesto ? '✅ Sí' : (c.call_id ? '❌ No' : '—')}</span></div>
            <div class="detail-row"><span class="detail-lbl">Intentos</span><span class="detail-val">${c.intentos || '—'}</span></div>
            <div class="detail-row"><span class="detail-lbl">Sentimiento</span><span class="detail-val">${c.sentimiento || '—'}</span></div>
            ${c.grabacion ? `<div class="detail-row"><span class="detail-lbl">Grabación</span><a href="${c.grabacion}" target="_blank" class="detail-val" style="color:var(--blue)">▶ Escuchar</a></div>` : ''}
        </div>
        ${c.resumen ? `<div class="detail-section"><div class="detail-section-title">Resumen de llamada</div>
            <div style="font-size:13px;color:var(--text-mid);line-height:1.6;padding:8px 0">${c.resumen}</div>
        </div>` : ''}`;
        document.getElementById('detailOverlay').classList.add('visible');
        document.getElementById('detailPanel').classList.add('visible');
    }

    function closeDetail() {
        document.getElementById('detailOverlay').classList.remove('visible');
        document.getElementById('detailPanel').classList.remove('visible');
    }

    // Escuchar cambio de agencia desde sidebar.js
    window.addEventListener('wms:agencia', (e) => {
        currentAgencia = e.detail.agencia === 'CR' ? 'cr' : 'col';
        updateAgenciaStats();
        renderList();
    });

    // Cargar al iniciar — esperar a que sidebar.js esté listo
    window.addEventListener('DOMContentLoaded', () => {
        const _ag = (typeof getAgencia === 'function') ? getAgencia() : 'CR';
        currentAgencia = _ag === 'CR' ? 'cr' : 'col';
    });
    fetchData();
    </script>
    <script src="../sidebar.js"></script>
</body>
</html>
